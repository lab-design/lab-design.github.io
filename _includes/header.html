<header class="site-header">
  <div class="container site-header__inner">
    <a href="/" class="site-brand">
      <span class="site-brand__chip">
        <img src="/img/tulane-shield.png" alt="Tulane University" class="site-brand__shield">
      </span>
      <span class="site-brand__text">
        <span class="site-brand__lab">Laboratory for Software Design</span>
        <span class="site-brand__school">Department of Computer Science &middot; School of Science &amp; Engineering</span>
      </span>
    </a>

    <input type="checkbox" id="nav-toggle" class="nav-toggle-cb">
    <label for="nav-toggle" class="nav-toggle" aria-label="Toggle navigation"><span></span></label>

    <nav class="site-nav">
      {% assign p = page.url %}
      <a href="/projects.html" class="{% if p contains '/projects' or p contains '/modularity' or p contains '/panini' or p contains '/ptolemy' %}is-active{% endif %}">Projects</a>
      <a href="/papers/" class="{% if p contains '/papers' %}is-active{% endif %}">Papers</a>
      <a href="/grants/" class="{% if p contains '/grants' %}is-active{% endif %}">Grants</a>
      <a href="/news/" class="{% if p contains '/news' %}is-active{% endif %}">News</a>
      <a href="/people.html" class="{% if p contains '/people' %}is-active{% endif %}">People</a>
      <a href="/about/" class="{% if p contains '/about' %}is-active{% endif %}">About</a>
    </nav>
  </div>
</header>
