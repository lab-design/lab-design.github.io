<!DOCTYPE html>
<html lang="en">
  <head>

    <meta charset="utf-8">

    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta name="description" content="The Laboratory for Software Design at Tulane University researches programming languages, compilers, and software engineering for dependable software and AI.">
    <meta name="theme-color" content="#006747">
    <meta property="og:title" content="{{ page.title | default: 'Laboratory for Software Design' }}">
    <meta property="og:description" content="Laboratory for Software Design at Tulane University, School of Science and Engineering.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://lab-design.github.io{{ page.url }}">
    <meta property="og:site_name" content="Laboratory for Software Design">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="{{ page.title | default: 'Laboratory for Software Design' }}">
    <meta name="twitter:description" content="Laboratory for Software Design at Tulane University, School of Science and Engineering.">
    <link rel="canonical" href="https://lab-design.github.io{{ page.url }}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&family=Source+Serif+4:opsz,wght@8..60,600;8..60,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/design.css">
    <link rel="icon" href="/favicon.ico">
    <title>{% if page.title %}{{ page.title }} | {% endif %}Laboratory for Software Design</title>
  </head>

  <body>
